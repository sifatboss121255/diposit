<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডেইলি টাস্ক</title>
    <style>
        body { background: #f4f4f4; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 400px; margin: 50px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: purple; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        h2 { color: #333; }
        .stat { font-size: 20px; color: green; font-weight: bold; margin: 15px 0; }
        .btn-task { background: indigo; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-task:disabled { background: #ccc; cursor: not-allowed; }
        .home-link { display: block; margin-top: 20px; color: purple; text-decoration: none; font-weight: bold; }
        .msg { color: red; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        আপনার আজকের কাজ
    </div>

    <div class="card">
        <h3>বর্তমান প্ল্যান: {{ plan }}</h3>

        <div class="stat">
            সম্পন্ন হয়েছে: {{ done }} / {{ limit }}
        </div>

        {% if done < limit %}
            <p>নিচের বাটনে ক্লিক করে কাজ শুরু করুন।</p>
            <button onclick="startTask()" class="btn-task" id="taskBtn">কাজ শুরু করুন</button>
        {% else %}
            <p class="msg">আপনার আজকের সব কাজ শেষ! আগামীকাল আবার চেষ্টা করুন।</p>
        {% endif %}

        <a href="/" class="home-link">হোমে ফিরে যান</a>
    </div>

    <script>
        function startTask() {
            // ১. তোমার ইউটিউব ভিডিওর লিংক এখানে বসাও
            window.open("https://www.effectivegatecpm.com/j3irhei40?key=3766eec03ebc58ede3768d8ac6b0463f/watch?v=YOUR_VIDEO_ID", "_blank");

            // ২. বাটন ডিজেবল করে মেসেজ দেখাবে
            let btn = document.getElementById("taskBtn");
            btn.disabled = true;
            btn.innerText = "৫ সেকেন্ড অপেক্ষা করুন...";

            // ৩. ৫ সেকেন্ড (৫০০০ মিলিসেকেন্ড) পর অটোমেটিক মেইন সার্ভারে টাকা যোগ করতে পাঠাবে
            setTimeout(function(){
                window.location.href = "/complete_task";
            }, 5000);
        }
    </script>

</body>
</html>
