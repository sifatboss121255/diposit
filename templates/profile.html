<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .stats-box { display: flex; justify-content: space-between; margin-top: 15px; flex-wrap: wrap; }
        .history-btn { display: block; width: 48%; padding: 12px; margin-top: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; box-sizing: border-box; text-align: center; }
        .dep-btn { background: #28a745; color: white; }
        .wit-btn { background: #007bff; color: white; }
        /* রেফারেল বাটনের জন্য স্টাইল */
        .ref-btn { background: #ffa500; color: #000; width: 100% !important; border: 1px solid #d48a00; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-msg">আমার প্রোফাইল</div>

        <div class="form-container" style="text-align: center;">
            <i class="fas fa-user-circle" style="font-size: 60px; color: #4b0082;"></i>
            <h3 style="color: #4b0082; margin-top: 10px;">{{ user[1] }}</h3>
            <p style="margin-bottom: 15px;">মোবাইল: {{ user[2] }}</p>

            <div style="background: #eef2ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #4b0082;">
                <p style="margin: 0; font-size: 14px; color: #555;">আপনার বর্তমান প্ল্যান</p>
                <h4 style="margin: 5px 0; color: #4b0082; font-size: 18px;">
                    <i class="fas fa-gem"></i> {{ user[5] if user[5] else 'কোনো প্ল্যান নেই' }}
                </h4>
            </div>

            <div style="background: #28a745; padding: 20px; border-radius: 12px; color: white; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);">
                <h1 style="margin: 0;">৳ {{ user[4] }}</h1>
                <p style="margin: 0; font-size: 14px; opacity: 0.9;">মোট ব্যালেন্স</p>
            </div>

            <div class="stats-box">
    <a href="/deposit" class="history-btn dep-btn"><i class="fas fa-plus-circle"></i> ডিপোজিট</a>
    <a href="/withdraw" class="history-btn wit-btn"><i class="fas fa-minus-circle"></i> উইথড্র</a>

    <a href="/refer" class="history-btn" style="background: #ffa500; color: black; width: 100%; margin-top: 10px; text-decoration: none; border-radius: 8px; font-weight: bold; padding: 12px; display: block;">
        <i class="fas fa-users"></i> বন্ধুদের রেফার করুন (বোনাস)
    </a>
</div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

            <a href="/logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold; font-size: 14px;">
                <i class="fas fa-sign-out-alt"></i> লগআউট করুন
            </a>
        </div>

        <br>
        <a href="/" style="display: block; text-align: center; color: #4b0082; text-decoration: none; font-weight: bold;">
            <i class="fas fa-home"></i> হোমে ফিরে যান
        </a>
    </div>
</body>
</html>
